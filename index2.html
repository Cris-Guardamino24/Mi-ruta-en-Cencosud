<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<section class="historias">

  <h2>Nuestras Historias de Éxito: Cencosud</h2>
  <p class="sub">Historias reales que transforman el retail cada día.</p>

  <div class="carousel">

    <button class="arrow left">❮</button>

    <div class="track" id="track">

      <div class="card">
        <img src="https://picsum.photos/200/250?1">
        <h4>Luis Perez</h4>
        <p>Innovación en Logística</p>
      </div>

      <div class="card active">
        <img src="https://picsum.photos/200/250?2">
        <h4>María Gonzales</h4>
        <p>De Cajera a Líder Regional</p>
        <span class="tag">9 años</span>
        <button>Ver historia</button>
      </div>

      <div class="card">
        <img src="https://picsum.photos/200/250?3">
        <h4>Carmen Ortiz</h4>
        <p>Pasión por el servicio</p>
      </div>

      <div class="card">
        <img src="https://picsum.photos/200/250?4">
        <h4>Diego Castro</h4>
        <p>Excelencia Digital</p>
      </div>

    </div>

    <button class="arrow right">❯</button>

  </div>

</section>


<script src="/script.js"></script>
</body>
</html>
